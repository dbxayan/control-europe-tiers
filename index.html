<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Europe Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>CONTROL EUROPE</h1>
        <p class="subtitle">Top 20 Leaderboard & Tier List</p>
    </header>

    <main class="container">
        <!-- Leaderboard Section -->
        <section class="leaderboard-section">
            <h2>Top 20 Ranks</h2>
            <div id="ranks-container" class="ranks-grid">
                <!-- JavaScript will dynamically load the 20 ranks here -->
            </div>
        </section>

        <hr class="section-divider">

        <!-- Tier List Section -->
        <section class="tierlist-section">
            <h2>Skill Tiers</h2>
            <div class="tier-container">
                <!-- Tier 1 -->
                <div class="tier-row">
                    <div class="tier-label tier-1">Tier 1</div>
                    <div class="tier-dropzone" data-tier="1"></div>
                </div>
                <!-- Tier 2 -->
                <div class="tier-row">
                    <div class="tier-label tier-2">Tier 2</div>
                    <div class="tier-dropzone" data-tier="2"></div>
                </div>
                <!-- Tier 3 -->
                <div class="tier-row">
                    <div class="tier-label tier-3">Tier 3</div>
                    <div class="tier-dropzone" data-tier="3"></div>
                </div>
                <!-- Tier 4 -->
                <div class="tier-row">
                    <div class="tier-label tier-4">Tier 4</div>
                    <div class="tier-dropzone" data-tier="4"></div>
                </div>
                <!-- Tier 5 -->
                <div class="tier-row">
                    <div class="tier-label tier-5">Tier 5</div>
                    <div class="tier-dropzone" data-tier="5"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
